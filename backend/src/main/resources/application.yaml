spring:
  application:
    name: eco-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/eco
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true

server:
  servlet:
    context-path: /api

eco:
  auth:
    jwt-secret: "dev-secret-change-before-production-dev-secret-change-before-production"
    access-token-seconds: 900
    refresh-token-seconds: 604800
