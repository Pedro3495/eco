spring:
  application:
    name: eco-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  servlet:
    context-path: /api

eco:
  auth:
    jwt-secret: ${ECO_JWT_SECRET}
    access-token-seconds: ${ECO_ACCESS_TOKEN_SECONDS:900}
    refresh-token-seconds: ${ECO_REFRESH_TOKEN_SECONDS:604800}
    cookie-secure: ${ECO_COOKIE_SECURE:true}
