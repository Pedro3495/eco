spring:
  application:
    name: eco-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/eco}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true

server:
  servlet:
    context-path: /api

eco:
  auth:
    jwt-secret: ${ECO_JWT_SECRET:local-development-secret-change-before-deploying-eco}
    access-token-seconds: ${ECO_ACCESS_TOKEN_SECONDS:900}
    refresh-token-seconds: ${ECO_REFRESH_TOKEN_SECONDS:604800}
