name: Backend CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Build and test backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: eco
          POSTGRES_USER: eco_ci
          POSTGRES_PASSWORD: eco_ci_password_for_tests_only
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d eco"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Run backend tests
        working-directory: backend
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/eco
          SPRING_DATASOURCE_USERNAME: eco_ci
          SPRING_DATASOURCE_PASSWORD: eco_ci_password_for_tests_only
          ECO_JWT_SECRET: ci-test-secret-change-before-open-source-123456
          ECO_COOKIE_SECURE: "false"
        run: |
          chmod +x mvnw
          ./mvnw test
